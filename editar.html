<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Aventura - Dados & Calangos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=MedievalSharp&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: #F7F7F7;
            --cor-fundo-card: #FFDBA7;
            --cor-primaria: #D06E41;
            --cor-texto: #221A29;
            --cor-texto-secundario: #5c5561;
            --cor-borda: #DFE0DF;
            --sombra: 0 4px 12px rgba(0, 0, 0, 0.1);
            --fonte-titulo: 'MedievalSharp', cursive;
            --fonte-label: 'Cinzel', serif;
            --fonte-corpo: 'Roboto', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--fonte-corpo); background-color: var(--cor-fundo); color: var(--cor-texto); line-height: 1.6; }
        a { color: var(--cor-primaria); text-decoration: none; }
        a:hover { text-decoration: underline; }
        header { text-align: center; padding: 1rem; border-bottom: 1px solid var(--cor-borda); }
        .header-top { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding-bottom: 1rem; }
        header .logo { max-width: 100px; }
        header h1 { font-family: var(--fonte-titulo); color: var(--cor-texto); font-size: 2.5rem; }
        .container { max-width: 800px; margin: 2rem auto; padding: 2rem; background-color: var(--cor-fundo-card); border-radius: 8px; }
        h2 { font-family: var(--fonte-titulo); color: var(--cor-primaria); margin-bottom: 1.5rem; text-align: center; }
        .form-grupo { margin-bottom: 1rem; }
        .form-grupo label { display: block; margin-bottom: 0.5rem; color: var(--cor-texto); font-family: var(--fonte-label); font-weight: 700; }
        .form-grupo input, .form-grupo textarea, .form-grupo select { width: 100%; padding: 0.8rem; background-color: var(--cor-fundo); border: 1px solid var(--cor-borda); border-radius: 4px; color: var(--cor-texto); font-size: 1rem; font-family: var(--fonte-corpo); }
        .form-grupo-radio { display: flex; gap: 1rem; align-items: center; }
        .form-grupo-radio label { font-family: var(--fonte-corpo); font-weight: 400; }
        .form-grupo textarea { resize: vertical; min-height: 100px; }
        button { cursor: pointer; border: none; border-radius: 4px; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; transition: background-color 0.2s; font-family: var(--fonte-corpo); }
        .btn-primario { background-color: var(--cor-primaria); color: #fff; }
        .btn-primario:hover { background-color: #b85b30; }
        .btn-primario:disabled { background-color: #a0a0a0; }
    </style>
</head>
<body>
    <header>
        <div class="header-top">
            <a href="index.html"><img src="https://i.imgur.com/SzXWxJe.png" alt="Logo Dados & Calangos" class="logo"></a>
            <a href="index.html"><h1>Dados & Calangos</h1></a>
            <div id="user-area"></div>
        </div>
    </header>
    <div class="container" id="edit-container">
        <h2>Editar Aventura</h2>
        <form id="edit-form">
            </form>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAyIrdaURuGFvBXXzrmQEDhtHwX5ll8Do4",
          authDomain: "dados-e-calangos-467521.firebaseapp.com",
          projectId: "dados-e-calangos-467521",
          storageBucket: "dados-e-calangos-467521.appspot.com",
          messagingSenderId: "1021912207307",
          appId: "1:1021912207307:web:2b29c38483a30696ecb04e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const usersCollection = db.collection('users');
        const userArea = document.getElementById('user-area');
        const editForm = document.getElementById('edit-form');
        const urlParams = new URLSearchParams(window.location.search);
        const aventuraId = urlParams.get('id');
        let aventuraRef;
        if (aventuraId) {
            aventuraRef = db.collection('aventuras').doc(aventuraId);
        } else {
            document.getElementById('edit-container').innerHTML = '<h2>Aventura não encontrada.</h2>';
        }
        auth.onAuthStateChanged(async user => {
            if (user) {
                const userProfileDoc = await usersCollection.doc(user.uid).get();
                const userProfile = userProfileDoc.data();
                userArea.innerHTML = `<a href="profile.html" class="btn btn-secundario">Meu Perfil</a>`;
                
                const aventuraDoc = await aventuraRef.get();
                if (!aventuraDoc.exists) {
                    document.getElementById('edit-container').innerHTML = '<h2>Aventura não encontrada.</h2>';
                    return;
                }
                const aventura = aventuraDoc.data();
                if (user.uid !== aventura.mestreUid && !userProfile.isAdmin) {
                    document.getElementById('edit-container').innerHTML = '<h2>Você não tem permissão para editar esta aventura.</h2>';
                    return;
                }
                populateForm(aventura);
            } else {
                window.location.href = 'index.html';
            }
        });
        function populateForm(aventura) {
            editForm.innerHTML = `
                <div class="form-grupo"><label for="titulo">Título da Aventura</label><input type="text" id="titulo" value="${aventura.titulo}" required></div>
                <div class="form-grupo"><label>Tipo de Aventura</label><div class="form-grupo-radio"><input type="radio" id="tipo-oneshot" name="tipo_aventura" value="One-Shot" ${aventura.tipo === 'One-Shot' ? 'checked' : ''}><label for="tipo-oneshot">One-Shot</label><input type="radio" id="tipo-campanha" name="tipo_aventura" value="Campanha" ${aventura.tipo === 'Campanha' ? 'checked' : ''}><label for="tipo-campanha">Campanha</label></div></div>
                <div class="form-grupo"><label for="sistema">Sistema de RPG</label><input type="text" id="sistema" value="${aventura.sistema}" required></div>
                <div class="form-grupo"><label for="nivel">Nível Recomendado</label><input type="text" id="nivel" value="${aventura.nivel}" required></div>
                <div class="form-grupo"><label for="vagas">Número de Vagas</label><input type="number" id="vagas" value="${aventura.vagas}" min="1" required></div>
                <div class="form-grupo"><label for="imagem">URL da Imagem</label><input type="url" id="imagem" value="${aventura.imagemUrl}"></div>
                <div class="form-grupo"><label for="gatilho">Alertas de Gatilho</label><input type="text" id="gatilho" value="${aventura.gatilho}" required></div>
                <div class="form-grupo"><label for="descricao">Descrição</label><textarea id="descricao" required>${aventura.descricao}</textarea></div>
                <button type="submit" class="btn-primario">Salvar Alterações</button>
            `;
            editForm.addEventListener('submit', salvarEdicao);
        }
        async function salvarEdicao(event) {
            event.preventDefault();
            const updatedData = {
                titulo: document.getElementById('titulo').value,
                tipo: document.querySelector('input[name="tipo_aventura"]:checked').value,
                sistema: document.getElementById('sistema').value,
                nivel: document.getElementById('nivel').value,
                vagas: parseInt(document.getElementById('vagas').value),
                imagemUrl: document.getElementById('imagem').value,
                gatilho: document.getElementById('gatilho').value,
                descricao: document.getElementById('descricao').value,
            };
            try {
                await aventuraRef.update(updatedData);
                alert('Aventura atualizada com sucesso!');
                window.location.href = `aventura.html?id=${aventuraId}`;
            } catch (error) {
                console.error("Erro ao atualizar:", error);
                alert("Não foi possível salvar as alterações.");
            }
        }
    </script>
</body>
</html>
