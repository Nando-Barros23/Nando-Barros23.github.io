<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados & Calangos - Mural</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=MedievalSharp&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --cor-fundo: #F7F7F7;
            --cor-fundo-card: #FFDBA7;
            --cor-primaria: #D06E41;
            --cor-texto: #221A29;
            --cor-texto-secundario: #5c5561;
            --cor-alerta-fundo: #fadcb3;
            --cor-alerta-texto: #8c6d3f;
            --cor-borda: #DFE0DF;
            --sombra: 0 4px 12px rgba(0, 0, 0, 0.1);
            --fonte-titulo: 'MedievalSharp', cursive;
            --fonte-label: 'Cinzel', serif;
            --fonte-corpo: 'Roboto', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--fonte-corpo); background-color: var(--cor-fundo); color: var(--cor-texto); line-height: 1.6; }
        a { color: var(--cor-primaria); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; display: grid; grid-template-columns: 1fr; gap: 2rem; }
        @media (min-width: 992px) { .container { grid-template-columns: 2fr 1fr; } }
        
        header { text-align: center; padding: 1rem; border-bottom: 1px solid var(--cor-borda); }
        .header-top { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding-bottom: 1rem; }
        header .logo { max-width: 100px; }
        header h1 { font-family: var(--fonte-titulo); color: var(--cor-texto); font-size: 2.5rem; }
        
        #user-auth-area button { margin-left: 0.5rem; }
        #user-info-area { display: flex; align-items: center; gap: 1rem; }
        #user-info-area img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        
        h2, h3 { font-family: var(--fonte-titulo); color: var(--cor-primaria); }
        h2 { border-bottom: 2px solid var(--cor-borda); padding-bottom: 0.5rem; margin-bottom: 1rem; }

        #mural-aventuras { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .card-aventura { background-color: var(--cor-fundo-card); border: 1px solid var(--cor-borda); border-radius: 8px; box-shadow: var(--sombra); transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; overflow: hidden; }
        .card-aventura:hover { transform: translateY(-5px); box-shadow: 0 8px 16px rgba(208, 110, 65, 0.2); }
        .card-imagem { width: 100%; height: 180px; object-fit: cover; }
        .card-conteudo { padding: 1.5rem; display: flex; flex-direction: column; flex-grow: 1; }
        .card-conteudo p { color: var(--cor-texto-secundario); margin-bottom: 1rem; }
        .card-conteudo .descricao { flex-grow: 1; }
        .card-conteudo strong { color: var(--cor-texto); font-weight: 700; }
        .card-gatilho { font-style: italic; color: var(--cor-alerta-texto); background-color: var(--cor-alerta-fundo); border: 1px solid var(--cor-alerta-texto); padding: 0.5rem; border-radius: 4px; font-size: 0.9rem; }
        .jogadores-lista { font-size: 0.9rem; list-style-position: inside; }
        #mensagem-vazio { color: var(--cor-texto-secundario); grid-column: 1 / -1; text-align: center; padding: 2rem; background-color: var(--cor-fundo-card); border-radius: 8px; border: 1px solid var(--cor-borda); }
        
        .painel-mestre { display: none; background-color: var(--cor-fundo-card); padding: 2rem; border-radius: 8px; border: 1px solid var(--cor-borda); position: sticky; top: 2rem; }
        .form-grupo { margin-bottom: 1rem; }
        .form-grupo label { display: block; margin-bottom: 0.5rem; color: var(--cor-texto); font-family: var(--fonte-label); font-weight: 700; }
        .form-grupo input, .form-grupo textarea, .form-grupo select { width: 100%; padding: 0.8rem; background-color: var(--cor-fundo); border: 1px solid var(--cor-borda); border-radius: 4px; color: var(--cor-texto); font-size: 1rem; font-family: var(--fonte-corpo); }
        .form-grupo-radio { display: flex; gap: 1rem; align-items: center; }
        .form-grupo-radio label { font-family: var(--fonte-corpo); font-weight: 400; }
        .form-grupo textarea { resize: vertical; min-height: 100px; }
        .form-grupo input:focus, .form-grupo textarea:focus, .form-grupo select:focus { border-color: var(--cor-primaria); outline: none; }
        
        .status-select { padding: 0.2rem; font-size: 0.9rem; border-radius: 4px; border: 1px solid var(--cor-primaria); background-color: var(--cor-fundo); }
        
        button, .btn-link { cursor: pointer; border: none; border-radius: 4px; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; transition: background-color 0.2s, color 0.2s; font-family: var(--fonte-corpo); text-align: center; }
        .btn { padding: 0.6rem 1.2rem; font-size: 0.9rem; }
        .btn-primario { background-color: var(--cor-primaria); color: #fff; }
        .btn-primario:hover { background-color: #b85b30; }
        .btn-primario:disabled { background-color: #a0a0a0; cursor: not-allowed; }
        .btn-secundario { background-color: transparent; border: 1px solid var(--cor-primaria); color: var(--cor-primaria); }
        .btn-secundario:hover { background-color: var(--cor-primaria); color: #fff; }
        .btn-deletar { background-color: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; align-self: flex-start; margin-top: 1rem; padding: 0.5rem 1rem; }
        .btn-deletar:hover { background-color: #ff4d4d; color: #fff; }
        .card-actions { display: flex; justify-content: space-between; align-items: center; margin-top: auto; flex-wrap: wrap; gap: 0.5rem; }
        .btn-editar { background-color: transparent; border: 1px solid #4CAF50; color: #4CAF50; margin-left: 0.5rem; }
        .btn-editar:hover { background-color: #4CAF50; color: #fff; }


        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: var(--cor-fundo-card); padding: 2rem; border-radius: 8px; width: 90%; max-width: 400px; position: relative; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .modal .logo { max-width: 80px; margin-bottom: 1rem; }
        .modal-close { position: absolute; top: 1rem; right: 1rem; font-size: 1.5rem; cursor: pointer; border: none; background: none; color: var(--cor-texto); }
        .modal h2 { text-align: center; }
        .modal form { width: 100%; }
        #google-login-btn { width: 100%; margin-top: 1rem; background-color: #4285F4; color: white; }
        #google-login-btn:hover { background-color: #357ae8; }
    </style>
</head>
<body>
    
    <header>
        <div class="header-top">
            <a href="index.html"><img src="https://i.imgur.com/SzXWxJe.png" alt="Logo Dados & Calangos" class="logo"></a>
            <a href="index.html"><h1>Dados & Calangos</h1></a>
            <div id="user-area"></div>
        </div>
    </header>

    <div class="container">
        <main>
            <h2>Chamados de Aventura</h2>
            <div id="mural-aventuras"></div>
        </main>
        
        <aside>
            <div class="painel-mestre" id="painel-mestre">
                <h2 id="painel-mestre-titulo">Painel do Mestre</h2>
                <form id="form-aventura">
                    <input type="hidden" id="aventura-id-editar"> <div class="form-grupo"><label for="titulo">Título da Aventura</label><input type="text" id="titulo" required></div>
                    <div class="form-grupo"><label for="mestre">Nome do Mestre</label><input type="text" id="mestre" required disabled></div>
                    <div class="form-grupo">
                        <label>Tipo de Aventura</label>
                        <div class="form-grupo-radio">
                            <input type="radio" id="tipo-oneshot" name="tipo_aventura" value="One-Shot" checked><label for="tipo-oneshot">One-Shot</label>
                            <input type="radio" id="tipo-campanha" name="tipo_aventura" value="Campanha"><label for="tipo-campanha">Campanha</label>
                        </div>
                    </div>
                    <div class="form-grupo"><label for="sistema">Sistema de RPG</label><input type="text" id="sistema" required></div>
                    <div class="form-grupo"><label for="nivel">Nível Recomendado</label><input type="text" id="nivel" required></div>
                    <div class="form-grupo"><label for="vagas">Número de Vagas</label><input type="number" id="vagas" min="1" required></div>
                    <div class="form-grupo"><label for="imagem">URL da Imagem</label><input type="url" id="imagem" placeholder="https://... (cole o link da imagem aqui)"></div>
                    <div class="form-grupo"><label for="gatilho">Alertas de Gatilho</label><input type="text" id="gatilho" placeholder="Ex: Aracnofobia, Violência" required></div>
                    <div class="form-grupo"><label for="descricao">Descrição</label><textarea id="descricao" required></textarea></div>
                    <button type="submit" class="btn-primario" id="btn-publicar">Publicar Aventura</button>
                    <button type="button" class="btn-secundario" id="btn-cancelar-edicao" style="display:none; margin-top: 10px;">Cancelar Edição</button>
                </form>
            </div>
        </aside>
    </div>

    <div class="modal-overlay" id="auth-modal">
        <div class="modal" id="modal-content"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAyIrdaURuGFvBXXzrmQEDhtHwX5ll8Do4",
          authDomain: "dados-e-calangos-467521.firebaseapp.com",
          projectId: "dados-e-calangos-467521",
          storageBucket: "dados-e-calangos-467521.appspot.com",
          messagingSenderId: "1021912207307",
          appId: "1:1021912207307:web:2b29c38483a30696ecb04e"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const googleProvider = new firebase.auth.GoogleAuthProvider();
        const aventurasCollection = db.collection('aventuras');
        const usersCollection = db.collection('users');

        const userArea = document.getElementById('user-area');
        const painelMestre = document.getElementById('painel-mestre');
        const muralAventuras = document.getElementById('mural-aventuras');
        const formAventura = document.getElementById('form-aventura');
        const authModal = document.getElementById('auth-modal');
        const modalContent = document.getElementById('modal-content');

        // Elementos do formulário
        const tituloInput = document.getElementById('titulo');
        const mestreInput = document.getElementById('mestre');
        const tipoOneshotRadio = document.getElementById('tipo-oneshot');
        const tipoCampanhaRadio = document.getElementById('tipo-campanha');
        const sistemaInput = document.getElementById('sistema');
        const nivelInput = document.getElementById('nivel');
        const vagasInput = document.getElementById('vagas');
        const imagemInput = document.getElementById('imagem');
        const gatilhoInput = document.getElementById('gatilho');
        const descricaoTextarea = document.getElementById('descricao');
        const btnPublicar = document.getElementById('btn-publicar');
        const btnCancelarEdicao = document.getElementById('btn-cancelar-edicao');
        const aventuraIdEditarInput = document.getElementById('aventura-id-editar');
        const painelMestreTitulo = document.getElementById('painel-mestre-titulo');


        let currentUser = null;
        let currentUserProfile = null;
        let editingAventuraId = null; // Para controlar o modo de edição

        auth.onAuthStateChanged(async user => {
            if (user) {
                currentUser = user;
                const userProfileDoc = await usersCollection.doc(user.uid).get();
                if (userProfileDoc.exists) {
                    currentUserProfile = userProfileDoc.data();
                } else {
                    const newProfile = { email: user.email, username: user.displayName || 'Novo Calango', photoURL: user.photoURL || 'https://i.imgur.com/sB0r32J.png', role: 'player', masterRequest: false, isAdmin: false };
                    await usersCollection.doc(user.uid).set(newProfile);
                    currentUserProfile = newProfile;
                }
                userArea.innerHTML = `<div id="user-info-area"><a href="profile.html"><img src="${currentUserProfile.photoURL}" alt="Avatar"></a><span>Olá, <a href="profile.html">${currentUserProfile.username}</a>!</span><button id="logout-btn" class="btn btn-secundario">Sair</button></div>`;
                document.getElementById('logout-btn').addEventListener('click', () => auth.signOut());
                if (currentUserProfile.role === 'master' || currentUserProfile.isAdmin) {
                    painelMestre.style.display = 'block';
                    mestreInput.value = currentUserProfile.username;
                    mestreInput.disabled = true; // Garante que o mestre seja preenchido automaticamente
                } else {
                    painelMestre.style.display = 'none';
                }
            } else {
                currentUser = null;
                currentUserProfile = null;
                userArea.innerHTML = `<div id="user-auth-area"><button id="login-btn" class="btn btn-primario">Entrar</button><button id="signup-btn" class="btn btn-secundario">Cadastrar-se</button></div>`;
                painelMestre.style.display = 'none';
                document.getElementById('login-btn').addEventListener('click', () => showAuthForm('login'));
                document.getElementById('signup-btn').addEventListener('click', () => showAuthForm('signup'));
            }
        });

        const showAuthForm = (type) => {
            const isLogin = type === 'login';
            modalContent.innerHTML = `<button class="modal-close" id="modal-close-btn">&times;</button><img src="https://i.imgur.com/SzXWxJe.png" alt="Logo" class="logo"><h2>${isLogin ? 'Entrar' : 'Cadastrar'}</h2><form id="email-form"><div class="form-grupo"><label for="email">Email</label><input type="email" id="email" required></div><div class="form-grupo"><label for="password">Senha</label><input type="password" id="password" required></div><button type="submit" class="btn-primario">${isLogin ? 'Entrar' : 'Cadastrar'}</button></form><button id="google-login-btn" class="btn">Entrar com Google</button>`;
            authModal.style.display = 'flex';
            document.getElementById('modal-close-btn').addEventListener('click', () => authModal.style.display = 'none');
            document.getElementById('google-login-btn').addEventListener('click', signInWithGoogle);
            document.getElementById('email-form').addEventListener('submit', async (e) => { // Adicionado 'async' aqui
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                try {
                    const userCredential = isLogin 
                        ? await auth.signInWithEmailAndPassword(email, password)
                        : await auth.createUserWithEmailAndPassword(email, password);
                    
                    if (!isLogin) {
                        // Cria um perfil inicial para o novo usuário
                        await usersCollection.doc(userCredential.user.uid).set({
                            email: userCredential.user.email,
                            username: userCredential.user.displayName || 'Novo Calango',
                            photoURL: userCredential.user.photoURL || 'https://i.imgur.com/sB0r32J.png',
                            role: 'player',
                            masterRequest: false,
                            isAdmin: false
                        });
                    }
                    authModal.style.display = 'none';
                } catch (error) {
                    alert(error.message);
                }
            });
        };

        const signInWithGoogle = async () => { // Adicionado 'async' aqui
            try {
                const userCredential = await auth.signInWithPopup(googleProvider);
                // Verifica se o perfil já existe, se não, cria um
                const userProfileDoc = await usersCollection.doc(userCredential.user.uid).get();
                if (!userProfileDoc.exists) {
                    await usersCollection.doc(userCredential.user.uid).set({
                        email: userCredential.user.email,
                        username: userCredential.user.displayName || 'Novo Calango',
                        photoURL: userCredential.user.photoURL || 'https://i.imgur.com/sB0r32J.png',
                        role: 'player',
                        masterRequest: false,
                        isAdmin: false
                    });
                }
                authModal.style.display = 'none';
            } catch (error) {
                alert(error.message);
            }
        };
        
        authModal.addEventListener('click', (e) => {
            if (e.target === authModal) { authModal.style.display = 'none'; }
        });
        
        const renderizarAventuras = (aventurasDocs) => {
            muralAventuras.innerHTML = '';
            if (aventurasDocs.empty) {
                muralAventuras.innerHTML = '<p id="mensagem-vazio">Nenhuma aventura publicada ainda.</p>';
                return;
            }
            aventurasDocs.forEach(aventuraDoc => {
                const aventura = aventuraDoc.data();
                const docId = aventuraDoc.id;
                // isMestre verifica se o usuário logado é o mestre da AVENTURA ESPECÍFICA
                const isMestreDaAventura = currentUser && currentUser.uid === aventura.mestreUid;
                const isAdminUser = currentUserProfile && currentUserProfile.isAdmin;

                let acaoHtml = `<a href="aventura.html?id=${docId}" class="btn-secundario btn-link">Ver Detalhes e Comentar</a>`;
                
                // Botões de edição e exclusão
                if (isMestreDaAventura || isAdminUser) {
                    acaoHtml += `<button class="btn btn-editar" data-id="${docId}" data-action="edit">Editar</button>`;
                    acaoHtml += `<button class="btn btn-deletar" data-id="${docId}" data-action="delete">Deletar</button>`;
                }

                const card = document.createElement('div');
                card.className = 'card-aventura';
                const imagemHtml = aventura.imagemUrl ? `<img src="${aventura.imagemUrl}" alt="Imagem da aventura" class="card-imagem">` : '';
                
                card.innerHTML = `
                    ${imagemHtml}
                    <div class="card-conteudo">
                        <h3>${aventura.titulo}</h3>
                        <p>
                            <strong>Mestre:</strong> ${aventura.mestre}<br>
                            <strong>Tipo:</strong> ${aventura.tipo || 'Não especificado'}<br>
                            <strong>Sistema:</strong> ${aventura.sistema}<br>
                            <strong>Status:</strong> ${aventura.status}
                        </p>
                        <div class="card-actions">${acaoHtml}</div>
                    </div>
                `;
                muralAventuras.appendChild(card);
            });
        };

        aventurasCollection.orderBy('createdAt', 'desc').onSnapshot(renderizarAventuras, (error) => {
            console.error("Erro ao buscar aventuras: ", error);
            muralAventuras.innerHTML = '<p id="mensagem-vazio">Erro ao carregar as aventuras.</p>';
        });

        muralAventuras.addEventListener('click', async (event) => { // Adicionado 'async' aqui
            const target = event.target;
            const docId = target.dataset.id;
            const action = target.dataset.action;

            if (action === 'delete') {
                if (confirm('Tem certeza que deseja deletar esta aventura?')) {
                    try {
                        await aventurasCollection.doc(docId).delete();
                        alert('Aventura deletada com sucesso!');
                    } catch (error) {
                        console.error("Erro ao deletar: ", error);
                        alert("Não foi possível deletar a aventura. Verifique suas permissões.");
                    }
                }
            } else if (action === 'edit') {
                await loadAventuraForEdit(docId);
            }
        });

        // Função para carregar dados da aventura no formulário para edição
        async function loadAventuraForEdit(docId) {
            try {
                const aventuraDoc = await aventurasCollection.doc(docId).get();
                if (!aventuraDoc.exists) {
                    alert('Aventura não encontrada para edição.');
                    return;
                }
                const aventura = aventuraDoc.data();
                editingAventuraId = docId; // Define o ID da aventura que está sendo editada

                // Preencher o formulário
                tituloInput.value = aventura.titulo;
                mestreInput.value = aventura.mestre; // Já está disabled, mas bom manter
                if (aventura.tipo === 'One-Shot') {
                    tipoOneshotRadio.checked = true;
                } else {
                    tipoCampanhaRadio.checked = true;
                }
                sistemaInput.value = aventura.sistema;
                nivelInput.value = aventura.nivel;
                vagasInput.value = aventura.vagas;
                imagemInput.value = aventura.imagemUrl || '';
                gatilhoInput.value = aventura.gatilho || '';
                descricaoTextarea.value = aventura.descricao;
                aventuraIdEditarInput.value = docId; // Salva o ID no campo oculto

                // Mudar o texto do botão e mostrar o botão de cancelar
                btnPublicar.textContent = 'Salvar Alterações';
                painelMestreTitulo.textContent = 'Editar Aventura';
                btnCancelarEdicao.style.display = 'inline-block';

                // Rolar para o painel do mestre
                painelMestre.scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                console.error("Erro ao carregar aventura para edição: ", error);
                alert("Não foi possível carregar a aventura para edição.");
            }
        }

        // Função para resetar o formulário e sair do modo de edição
        function resetFormAndExitEditMode() {
            formAventura.reset();
            mestreInput.value = currentUserProfile.username; // Volta a preencher o mestre
            btnPublicar.textContent = 'Publicar Aventura';
            painelMestreTitulo.textContent = 'Painel do Mestre';
            btnCancelarEdicao.style.display = 'none';
            editingAventuraId = null; // Limpa o ID de edição
            aventuraIdEditarInput.value = ''; // Limpa o campo oculto
        }

        btnCancelarEdicao.addEventListener('click', resetFormAndExitEditMode);


        formAventura.addEventListener('submit', async (event) => {
            event.preventDefault();
            if (!currentUser || (!currentUserProfile.role === 'master' && !currentUserProfile.isAdmin)) {
                alert('Apenas mestres ou administradores podem publicar/editar aventuras.');
                return;
            }

            const aventuraData = {
                titulo: tituloInput.value,
                mestre: mestreInput.value,
                mestreUid: currentUser.uid, // Garante que o mestreUid seja o do usuário logado
                tipo: document.querySelector('input[name="tipo_aventura"]:checked').value,
                sistema: sistemaInput.value,
                nivel: nivelInput.value,
                vagas: parseInt(vagasInput.value),
                gatilho: gatilhoInput.value,
                descricao: descricaoTextarea.value,
                imagemUrl: imagemInput.value,
            };

            // Se estiver editando, não altere createdAt nem status inicial
            if (editingAventuraId) {
                try {
                    await aventurasCollection.doc(editingAventuraId).update(aventuraData);
                    alert('Aventura atualizada com sucesso!');
                    resetFormAndExitEditMode();
                } catch (error) {
                    console.error("Erro ao atualizar aventura: ", error);
                    alert("Não foi possível atualizar a aventura. Verifique suas permissões.");
                }
            } else {
                // Se for nova aventura
                aventuraData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                aventuraData.status = 'Recrutando'; // Status padrão para nova aventura
                aventuraData.jogadores = [];
                aventuraData.suplentes = [];

                try {
                    await aventurasCollection.add(aventuraData);
                    alert('Aventura publicada com sucesso!');
                    formAventura.reset();
                    mestreInput.value = currentUserProfile.username; // Volta a preencher o mestre
                } catch (error) {
                    console.error("Erro ao adicionar aventura: ", error);
                    alert("Não foi possível publicar a aventura.");
                }
            }
        });
