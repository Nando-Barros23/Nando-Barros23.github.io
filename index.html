<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados & Calangos - Mural</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=MedievalSharp&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --cor-fundo: #F7F7F7;
            --cor-container: #FFDBA7; /* Cor creme para o container principal */
            --cor-card: #FFFFFF; /* Cor branca para os cards internos */
            --cor-primaria: #D06E41;
            --cor-texto: #221A29;
            --cor-texto-secundario: #5c5561;
            --cor-borda: #DFE0DF;
            --sombra: 0 4px 12px rgba(0, 0, 0, 0.1);
            --fonte-titulo: 'MedievalSharp', cursive;
            --fonte-label: 'Cinzel', serif;
            --fonte-corpo: 'Roboto', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--fonte-corpo); background-color: var(--cor-fundo); color: var(--cor-texto); line-height: 1.6; }
        a { color: var(--cor-primaria); text-decoration: none; }
        a:hover { text-decoration: underline; }
        
        .container-principal { max-width: 80%; margin: 2rem auto; padding: 2rem; display: grid; grid-template-columns: 1fr; gap: 2rem; background-color: var(--cor-container); border-radius: 8px; }
        @media (max-width: 1200px) { .container-principal { max-width: 95%; } }
        @media (min-width: 992px) { .container-principal { grid-template-columns: 2fr 1fr; } }

        header { text-align: center; padding: 1rem; border-bottom: 1px solid var(--cor-borda); }
        .header-top { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding-bottom: 1rem; }
        header .logo { max-width: 100px; }
        header h1 { font-family: var(--fonte-titulo); color: var(--cor-texto); font-size: 2.5rem; }
        #user-auth-area button { margin-left: 0.5rem; }
        #user-info-area { display: flex; align-items: center; gap: 1rem; }
        #user-info-area img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        
        h2, h3 { font-family: var(--fonte-titulo); color: var(--cor-primaria); }
        h2 { border-bottom: 2px solid var(--cor-borda); padding-bottom: 0.5rem; margin-bottom: 1rem; }

        #search-container { margin-bottom: 2rem; }
        #search-form { display: flex; gap: 10px; }
        #search-input { flex-grow: 1; padding: 0.8rem; border: 1px solid var(--cor-borda); border-radius: 4px; font-size: 1rem; }

        #mural-aventuras { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .card-aventura { background-color: var(--cor-card); border: 1px solid var(--cor-borda); border-radius: 8px; box-shadow: var(--sombra); transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; overflow: hidden; }
        .card-aventura:hover { transform: translateY(-5px); box-shadow: 0 8px 16px rgba(208, 110, 65, 0.2); }
        .card-imagem { width: 100%; height: 180px; object-fit: cover; }
        .card-conteudo { padding: 1.2rem; display: flex; flex-direction: column; flex-grow: 1; }
        .card-conteudo p { color: var(--cor-texto-secundario); margin-bottom: 1rem; }
        .card-conteudo strong { color: var(--cor-texto); font-weight: 700; }
        #mensagem-vazio { color: var(--cor-texto-secundario); grid-column: 1 / -1; text-align: center; padding: 2rem; background-color: var(--cor-card); border-radius: 8px; border: 1px solid var(--cor-borda); }
        
        .painel-mestre { display: none; background-color: var(--cor-card); padding: 1.6rem; border-radius: 8px; border: 1px solid var(--cor-borda); position: sticky; top: 2rem; }
        .form-grupo { margin-bottom: 1rem; }
        .form-grupo label { display: block; margin-bottom: 0.5rem; color: var(--cor-texto); font-family: var(--fonte-label); font-weight: 700; }
        .form-grupo input, .form-grupo textarea, .form-grupo select { width: 100%; padding: 0.8rem; background-color: var(--cor-fundo); border: 1px solid var(--cor-borda); border-radius: 4px; color: var(--cor-texto); font-size: 1rem; font-family: var(--fonte-corpo); }
        .form-grupo-radio { display: flex; gap: 1rem; align-items: center; }
        .form-grupo-radio label { font-family: var(--fonte-corpo); font-weight: 400; }
        .form-grupo textarea { resize: vertical; min-height: 100px; }
        .status-select { padding: 0.2rem; font-size: 0.9rem; border-radius: 4px; border: 1px solid var(--cor-primaria); background-color: var(--cor-fundo); }
        
        button, .btn-link { cursor: pointer; border: none; border-radius: 4px; padding: 0.6rem 1.2rem; font-size: 0.9rem; font-weight: bold; transition: background-color 0.2s, color 0.2s; font-family: var(--fonte-corpo); text-align: center; display: inline-block; }
        .btn-primario { background-color: var(--cor-primaria); color: #fff; }
        .btn-primario:hover { background-color: #b85b30; }
        .btn-primario:disabled { background-color: #a0a0a0; cursor: not-allowed; }
        .btn-secundario, .btn-deletar { background-color: transparent; border: 1px solid var(--cor-primaria); color: var(--cor-primaria); }
        .btn-secundario:hover, .btn-deletar:hover { background-color: var(--cor-primaria); color: #fff; }
        .btn-deletar { border-color: #ff4d4d; color: #ff4d4d; }
        .btn-deletar:hover { background-color: #ff4d4d; border-color: #ff4d4d; }
        .card-actions { display: flex; justify-content: space-between; align-items: center; margin-top: auto; flex-wrap: wrap; gap: 0.5rem; padding-top: 1rem; border-top: 1px solid var(--cor-borda); }
        .card-actions > * { flex: 1; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: var(--cor-card); padding: 2rem; border-radius: 8px; width: 90%; max-width: 400px; position: relative; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .modal .logo { max-width: 80px; margin-bottom: 1rem; }
        .modal-close { position: absolute; top: 1rem; right: 1rem; font-size: 1.5rem; cursor: pointer; border: none; background: none; color: var(--cor-texto); }
        .modal h2 { text-align: center; }
        .modal form { width: 100%; }
        #google-login-btn { width: 100%; margin-top: 1rem; background-color: #4285F4; color: white; }
        #google-login-btn:hover { background-color: #357ae8; }
    </style>
</head>
<body>
    <header>
        <div class="header-top">
            <a href="index.html"><img src="https://i.imgur.com/SzXWxJe.png" alt="Logo Dados & Calangos" class="logo"></a>
            <a href="index.html"><h1>Dados & Calangos</h1></a>
            <div id="user-area"></div>
        </div>
    </header>
    <div class="container-principal">
        <main>
            <h2>Chamados de Aventura</h2>
            <div id="search-container">
                <form id="search-form">
                    <input type="text" id="search-input" placeholder="Buscar por título, mestre ou sistema...">
                    <button type="submit" class="btn-primario">Buscar</button>
                </form>
            </div>
            <div id="mural-aventuras"></div>
        </main>
        <aside>
            <div class="painel-mestre" id="painel-mestre">
                <h2>Painel do Mestre</h2>
                <form id="form-aventura">
                    </form>
            </div>
        </aside>
    </div>
    <div class="modal-overlay" id="auth-modal"><div class="modal" id="modal-content"></div></div>
    
    <script>
        // Todo o JavaScript permanece o mesmo
    </script>
</body>
</html>
